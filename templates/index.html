{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h2 class="mb-4">Dashboard Overview</h2>
    </div>
</div>
<div class="row">
    <!-- IP Usage History -->
    <div class="col-md-4 mb-4">
        <div class="card h-100 p-4 text-center">
            <h3 class="text-primary"><i class="fa-solid fa-server mb-3"></i></h3>
            <h4 class="text-primary">IP Usage History</h4>
            <p class="text-muted">IP 使用历史</p>
            <a href="/ip_history" class="btn btn-outline-primary mt-auto">View</a>
        </div>
    </div>
    <!-- Fingerprinting -->
    <div class="col-md-4 mb-4">
        <div class="card h-100 p-4 text-center">
            <h3 class="text-primary"><i class="fa-solid fa-fingerprint mb-3"></i></h3>
            <h4 class="text-primary">Fingerprinting</h4>
            <p class="text-muted">指纹特征</p>
            <a href="/fingerprint" class="btn btn-outline-primary mt-auto">View</a>
        </div>
    </div>
    <!-- Spatial & Lifecycle -->
    <div class="col-md-4 mb-4">
        <div class="card h-100 p-4 text-center">
            <h3 class="text-info"><i class="fa-solid fa-network-wired mb-3"></i></h3>
            <h4 class="text-info">Spatial & Lifecycle</h4>
            <p class="text-muted">空间分布与生命周期</p>
            <a href="/lifecycle" class="btn btn-outline-info mt-auto">View</a>
        </div>
    </div>
    <!-- Compliance & Baseline -->
    <div class="col-md-4 mb-4">
        <div class="card h-100 p-4 text-center">
            <h3 class="text-success"><i class="fa-solid fa-user-shield mb-3"></i></h3>
            <h4 class="text-success">Compliance & Baseline</h4>
            <p class="text-muted">合规性与基准</p>
            <a href="/compliance" class="btn btn-outline-success mt-auto">View</a>
        </div>
    </div>
    <!-- Risk & Vulnerabilities -->
    <div class="col-md-4 mb-4">
        <div class="card h-100 p-4 text-center">
            <h3 class="text-danger"><i class="fa-solid fa-bug mb-3"></i></h3>
            <h4 class="text-danger">Risk & Vulnerabilities</h4>
            <p class="text-muted">风险与漏洞</p>
            <a href="/risk" class="btn btn-outline-danger mt-auto">View</a>
        </div>
    </div>
    <!-- Time Series Trend -->
    <div class="col-md-4 mb-4">
        <div class="card h-100 p-4 text-center">
            <h3 class="text-warning"><i class="fa-solid fa-bolt mb-3"></i></h3>
            <h4 class="text-warning">Time Series Trend</h4>
            <p class="text-muted">时间序列表现</p>
            <a href="/trend" class="btn btn-outline-warning mt-auto">View</a>
        </div>
    </div>
</div>
{% endblock %}
