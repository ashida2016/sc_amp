{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-12 mb-4 d-flex justify-content-between align-items-center">
        <h2>IP Report View</h2>
        <button class="btn btn-outline-info" onclick="window.location.reload()"><i
                class="fa-solid fa-arrows-rotate me-1"></i> Refresh</button>
    </div>
</div>

<div class="row p-0 m-0 w-100">
    <!-- Left Navigation -->
    <div class="col-md-2 col-sm-3 p-0 pe-3 position-relative">
        <div class="list-group shadow-sm sticky-top" id="subnetNav"
            style="top: 80px; max-height: calc(100vh - 100px); overflow-y: auto;">
            <!-- Rendered by JS -->
        </div>
    </div>

    <!-- Main Content -->
    <div class="col-md-10 col-sm-9 p-0" id="reportContent">
        <!-- Loading Spinner -->
        <div class="d-flex justify-content-center mt-5" id="reportSpinner">
            <div class="spinner-border text-info" style="width: 3rem; height: 3rem;" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<style>
    .subnet-card {
        border-radius: 8px;
        background-color: #212529;
    }


    .text-conflict {
        color: #ef4444 !important;
        font-weight: bold;
    }

    .text-manual {
        color: #4ade80 !important;
    }
</style>
<script>
    $(document).ready(function () {
        // Fetch report data
        $.get('/api/report', function (res) {
            $('#reportSpinner').addClass('d-none');
            const subnets = res.subnets;
            const data = res.data;
            let navHtml = '';
            let contentHtml = '';

            if (subnets.length === 0) {
                $('#reportContent').html(`<div class="alert alert-secondary">No recorded IPs found.</div>`);
                return;
            }

            // Date formatting helper
            function formatReportDate(dateString) {
                if (!dateString) return '';
                return dateString;
            }

            const vlanComments = res.vlan_comments || {};

            subnets.forEach(subnet => {
                // Sidebar Nav
                navHtml += `<a href="#subnet_${subnet.replace(/\./g, '_')}" class="list-group-item list-group-item-action list-group-item-dark fw-bold border-secondary py-3"><i class="fa-solid fa-network-wired me-2"></i> ${subnet}.0/24</a>`;

                // Subnet Content Section
                let tableRows = '';
                const ips = data[subnet];

                ips.forEach(ip => {
                    // Decide Hostname Display Strategy
                    let hostDisplay = ip.h_hostname || 'TBD/待定';
                    if (ip.e_hostname && ip.h_hostname && ip.e_hostname !== 'TBD/待定' && ip.e_hostname !== ip.h_hostname) {
                        hostDisplay = `<span class="text-danger fw-bold" title="Scanner: ${ip.h_hostname} | Hand filled: ${ip.e_hostname}">${ip.e_hostname} <i class="fa-solid fa-triangle-exclamation"></i></span>`;
                    } else if (ip.e_hostname && ip.e_hostname !== 'TBD/待定') {
                        hostDisplay = `<span class="text-manual">${ip.e_hostname}</span>`;
                    }
                    if (hostDisplay === 'TBD/待定') {
                        hostDisplay = `<span class="badge bg-warning text-dark">TBD/待定</span>`;
                    }

                    // Device Display Strategy
                    let devDisplay = ip.h_device_type || 'Any';
                    if (ip.e_device_type && ip.h_device_type && ip.e_device_type !== 'Any' && ip.e_device_type !== ip.h_device_type) {
                        devDisplay = `<span class="text-danger fw-bold" title="Scanner: ${ip.h_device_type} | Hand filled: ${ip.e_device_type}">${ip.e_device_type} <i class="fa-solid fa-triangle-exclamation"></i></span>`;
                    } else if (ip.e_device_type && ip.e_device_type !== 'Any') {
                        devDisplay = `<span class="text-manual">${ip.e_device_type}</span>`;
                    }
                    if (devDisplay === 'Any' || devDisplay === 'N/A') {
                        devDisplay = `<span class="badge bg-secondary">Any</span>`;
                    }

                    // Status Display Strategy
                    let statusVal = ip.h_status || ip.e_status || 'Unknown';
                    let statusDisplay = '';
                    if (ip.e_status && ip.h_status && ip.e_status !== 'Reserved' && ip.e_status !== ip.h_status) {
                        statusDisplay = `<span class="text-danger fw-bold" title="Scanner: ${ip.h_status} | Hand filled: ${ip.e_status}">${ip.e_status} <i class="fa-solid fa-triangle-exclamation"></i></span>`;
                    } else {
                        statusDisplay = `<span class="badge ${statusVal === 'Active' ? 'bg-success' : 'bg-secondary'}">${statusVal}</span>`;
                    }

                    // MAC Address Strategy
                    let macDisplay = ip.mac;
                    if (!macDisplay) {
                        macDisplay = `<span class="badge bg-secondary">N/A</span>`;
                    } else if (macDisplay === '00:00:00:00:00:00') {
                        macDisplay = `<span class="text-danger fw-bold">00:00:00:00:00:00</span>`;
                    }

                    // Vendor Display Strategy
                    let vendorDisplay = ip.vendor || '';

                    tableRows += `
                    <tr>
                        <td class="text-center">
                            <a href="/ip_detail?ip=${ip.ip}" target="_blank" class="fw-bold text-info text-decoration-none"><i class="fa-solid fa-link me-1"></i> ${ip.ip}</a>
                        </td>
                        <td>${macDisplay}</td>
                        <td style="max-width:200px;" class="text-truncate">${hostDisplay}</td>
                        <td class="text-center">${statusDisplay}</td>
                        <td>${vendorDisplay}</td>
                        <td>${devDisplay}</td>
                        <td>${ip.machine_name || '<span class="text-muted">-</span>'}</td>
                        <td>${ip.purpose || '<span class="text-muted">-</span>'}</td>
                        <td>${formatReportDate(ip.scan_time || ip.updated_time) || '<span class="text-muted">-</span>'}</td>
                    </tr>
                    `;
                });

                let subnetComment = vlanComments[subnet] ? ` <span class="text-secondary fs-6 ms-2 fw-normal">(${vlanComments[subnet]})</span>` : '';

                contentHtml += `
                <div class="card border-secondary mb-5 subnet-card shadow" id="subnet_${subnet.replace(/\./g, '_')}">
                    <div class="card-header bg-dark border-secondary d-flex justify-content-between align-items-center py-3">
                        <h4 class="mb-0 text-white"><i class="fa-solid fa-folder-tree text-info me-2"></i> Subnet: ${subnet}.0/24${subnetComment}</h4>
                        <span class="badge bg-primary rounded-pill fs-6">${ips.length} IPs recorded</span>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-dark table-striped table-hover mb-0 report-table">
                                <thead>
                                    <tr class="table-active">
                                        <th class="text-center border-secondary">IP Address</th>
                                        <th class="border-secondary">MAC Address</th>
                                        <th class="border-secondary">Host Name</th>
                                        <th class="text-center border-secondary">Status</th>
                                        <th class="border-secondary">Vendor</th>
                                        <th class="border-secondary">Device Type</th>
                                        <th class="border-secondary">Physical Server</th>
                                        <th class="border-secondary">Purpose</th>
                                        <th class="border-secondary">Last Updated</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${tableRows}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                `;
            });

            $('#subnetNav').html(navHtml);
            $('#reportContent').html(contentHtml);

            // Initialize DataTables
            $('.report-table').DataTable({
                paging: false,
                searching: true,
                info: false,
                ordering: true,
                order: [] // Keep the initial server-side sort
            });

            // Active nav handling on scroll
            const sections = $('.subnet-card');
            const navLinks = $('.list-group-item');

            $(window).on('scroll', function () {
                let current = '';
                sections.each(function () {
                    const sectionTop = $(this).offset().top;
                    if (scrollY >= sectionTop - 120) {
                        current = $(this).attr('id');
                    }
                });

                navLinks.removeClass('active bg-primary border-primary').addClass('list-group-item-dark');
                if (current) {
                    $(`a[href="#${current}"]`).removeClass('list-group-item-dark').addClass('active bg-primary border-primary');
                }
            });

        }).fail(function (err) {
            $('#reportSpinner').addClass('d-none');
            alert('Failed to load report data: ' + (err.responseJSON ? err.responseJSON.message : 'Unknown error'));
        });
    });
</script>
{% endblock %}
