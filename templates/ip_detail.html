{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-12 mb-4">
        <h2>IP Detail Management</h2>
    </div>
</div>

<div class="row mb-4">
    <div class="col-12">
        <div class="card">
            <div class="card-body d-flex align-items-center flex-wrap gap-2">
                <label class="text-white fw-bold">Select IP:</label>
                <select id="subnetSelect" class="form-select w-auto bg-dark text-light border-secondary">
                    <option value="">Loading...</option>
                </select>
                <span class="text-white fw-bold fs-4" style="line-height:1">.</span>
                <input type="number" id="ipSuffix" class="form-control bg-dark text-light border-secondary text-center"
                    style="width: 100px" min="1" max="254" placeholder="ex. 10">
                <button id="searchBtn" class="btn btn-primary px-4 ms-3"><i class="fa-solid fa-search me-1"></i>
                    Search</button>
            </div>
        </div>
    </div>
</div>

<div id="detailSection" class="d-none">
    <!-- Panel 1: Basic Info -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="card border-info" id="basicInfoCard">
                <div class="card-header bg-info bg-opacity-25 border-info" id="basicInfoHeader">
                    <h5 class="text-white mb-0" id="currentIpDisplay">Actual information</h5>
                </div>
                <div class="card-body" id="basicInfoContainer" style="background-color: rgba(0,0,0,0.2);">
                    <!-- Will be populated by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Panel 2: Extended Info -->
    <div class="row mb-5">
        <div class="col-12">
            <div class="card border-secondary" id="extendInfoCard">
                <div class="card-header bg-secondary bg-opacity-25 border-secondary" id="extendInfoHeader">
                    <h5 class="text-white mb-0" id="extendIpDisplay">Extended Information</h5>
                </div>
                <div class="card-body" style="background-color: rgba(0,0,0,0.2);">
                    <form id="extendForm">
                        <!-- New basic extended info row -->
                        <div class="row mb-3" id="extBasicRow">
                            <div class="col-md-4 mb-3 mb-md-0">
                                <label class="form-label text-light">Device Type:</label>
                                <select id="extDeviceType" class="form-select bg-dark text-light border-secondary">
                                    <!-- populated in JS -->
                                </select>
                            </div>
                            <div class="col-md-4 mb-3 mb-md-0">
                                <label class="form-label text-light">Host Name:</label>
                                <input type="text" id="extHostName"
                                    class="form-control bg-dark text-light border-secondary">
                                <small id="hostnameWarning" class="text-danger d-none fw-bold mt-1"><i
                                        class="fa-solid fa-triangle-exclamation"></i> Conflict with history!</small>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label text-light">Status:</label>
                                <input type="text" id="extStatus"
                                    class="form-control bg-dark text-light border-secondary" readonly>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label class="form-label text-light">Physical Machine (Storage/Server):</label>
                                <select id="pmSelect" class="form-select bg-dark text-light border-secondary">
                                    <option value="">-- Standalone / Not applicable --</option>
                                    <!-- Populated via JS -->
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-light">OS Version (Planned/Actual):</label>
                                <select id="osVer" class="form-select bg-dark text-light border-secondary">
                                    <option value="Others">Others</option>
                                    <option value="Windows">Windows</option>
                                    <option value="Linux">Linux</option>
                                    <option value="Esxi Server">Esxi Server</option>
                                </select>
                            </div>
                        </div>
                        <div class="row mb-4">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label class="form-label text-light">Purpose (用途说明):</label>
                                <input type="text" id="extPurpose"
                                    class="form-control bg-dark text-light border-secondary"
                                    placeholder="What is this IP used for?">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-light">Comment (备注):</label>
                                <input type="text" id="extComment"
                                    class="form-control bg-dark text-light border-secondary" placeholder="Extra notes">
                            </div>
                        </div>
                        <div class="text-end border-top border-secondary pt-3">
                            <button type="button" id="saveBtn" class="btn btn-success px-5 py-2 fw-bold"><i
                                    class="fa-solid fa-save me-1"></i> Save All Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Save Toast -->
<div class="toast-container position-fixed top-0 start-50 translate-middle-x p-3" style="z-index: 9999">
    <div id="saveToast" class="toast text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true"
        data-bs-delay="3000">
        <div class="d-flex">
            <div class="toast-body fs-5">
                <i class="fa-solid fa-circle-check me-2"></i> Successfully saved!
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
                aria-label="Close"></button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<style>
    .text-bright-green {
        color: #4ade80 !important;
    }
</style>
<script>
    $(document).ready(function () {
        let globalDeviceTypes = [];
        let isNewHistory = false;
        let currentIP = "";

        // 1. Initialize selects
        $.get('/api/ip_detail/init', function (res) {
            // subnets
            let subnetOpts = "";
            res.subnets.forEach(s => { subnetOpts += `<option value="${s}">${s}</option>`; });
            $('#subnetSelect').html(subnetOpts);

            // pms
            let pmOpts = '<option value="">-- Standalone / Not applicable --</option>';
            res.physical_machines.forEach(pm => {
                pmOpts += `<option value="${pm.id}">ID: ${pm.id} - ${pm.machine_name}</option>`;
            });
            $('#pmSelect').html(pmOpts);

            globalDeviceTypes = res.device_types;
            let dtOptions = `<option value="Any">Any</option>`;
            globalDeviceTypes.forEach(t => { dtOptions += `<option value="${t}">${t}</option>`; });
            $('#extDeviceType').html(dtOptions);
        });

        // 2. Search Button
        $('#searchBtn').click(function () {
            const subnet = $('#subnetSelect').val();
            const suffix = $('#ipSuffix').val();

            if (!subnet || !suffix || suffix < 1 || suffix > 254) {
                alert("Please input a valid suffix between 1 and 254.");
                return;
            }

            currentIP = `${subnet}.${suffix}`;

            // Hide details while loading
            $('#detailSection').addClass('d-none');
            $('#currentIpDisplay').html(`Actual information - ${currentIP}`);
            $('#extendIpDisplay').html(`Extended Information`);

            $.get(`/api/ip_detail/search?ip=${currentIP}`, function (res) {
                $('#detailSection').removeClass('d-none');

                // Render Basic Info logic
                if (res.history) {
                    isNewHistory = false;
                    $('#basicInfoCard').removeClass('border-secondary').addClass('border-info');
                    $('#basicInfoHeader').removeClass('bg-secondary border-secondary').addClass('bg-info border-info');
                    $('#currentIpDisplay').html(`Actual information - ${currentIP} <span class="badge bg-success ms-2">Existed !</span>`);

                    $('#basicInfoContainer').html(`
                    <div class="row text-light">
                        <div class="col-md-4 mb-2"><strong>Device Type:</strong> <span class="text-bright-green">${res.history.device_type || 'N/A'}</span></div>
                        <div class="col-md-4 mb-2"><strong>Host Name:</strong> <span class="text-bright-green">${res.history.hostname || 'N/A'}</span></div>
                        <div class="col-md-4 mb-2"><strong>Status:</strong> <span class="text-bright-green">${res.history.status}</span></div>
                        <div class="col-md-4 mb-2"><strong>MAC Addr:</strong> <span class="text-bright-green">${res.history.mac || 'N/A'}</span></div>
                        <div class="col-md-4 mb-2"><strong>Vendor:</strong> <span class="text-bright-green">${res.history.vendor || 'N/A'}</span></div>
                        <div class="col-md-4 mb-2"><strong>Last Scan:</strong> <span class="text-bright-green">${res.history.scan_time || 'N/A'}</span></div>
                    </div>
                    <div class="alert alert-secondary py-2 mt-2 mb-0 border-0 bg-transparent text-info">
                        <i class="fa-solid fa-clock-rotate-left"></i> The record above is extracted from historical scan logs and cannot be manually modified here.
                    </div>
                `);
                } else {
                    isNewHistory = true;
                    $('#basicInfoCard').removeClass('border-info').addClass('border-secondary');
                    $('#basicInfoHeader').removeClass('bg-info border-info').addClass('bg-secondary border-secondary');
                    $('#currentIpDisplay').html(`Actual information - ${currentIP}`);

                    $('#basicInfoContainer').html(`
                        <div class="alert alert-warning py-2 mb-0 bg-opacity-25 border-warning text-warning">
                            <i class="fa-solid fa-triangle-exclamation"></i> No historical scan records found for this IP. Wait for the scanner to populate this actual info.
                        </div>
                    `);
                }

                // Fill Extended Info
                let extDeviceType = "Any";
                let extHostName = "TBD/待定";
                let extStatus = "Reserved";

                $('#extHostName').removeClass('text-danger border-danger is-invalid');
                $('#hostnameWarning').addClass('d-none');

                if (res.history) {
                    extDeviceType = res.history.device_type || 'Any';
                    extStatus = res.history.status || 'Reserved';
                    let histHost = res.history.hostname || "";
                    if (res.extend) {
                        let extHost = res.extend.hostname || "";
                        if (extHost === "") {
                            extHostName = histHost;
                        } else if (extHost === histHost) {
                            extHostName = histHost;
                        } else {
                            extHostName = extHost;
                            $('#extHostName').addClass('text-danger border-danger is-invalid');
                            $('#hostnameWarning').removeClass('d-none');
                        }
                    } else {
                        extHostName = histHost;
                    }
                } else {
                    if (res.extend) {
                        extHostName = res.extend.hostname || "TBD/待定";
                        extDeviceType = res.extend.device_type || 'Any';
                        extStatus = res.extend.status || 'Reserved';
                    } else {
                        extHostName = "TBD/待定";
                        extDeviceType = "Any";
                        extStatus = "Reserved";
                    }
                }

                $('#extDeviceType').val(extDeviceType);
                $('#extHostName').val(extHostName);
                $('#extStatus').val(extStatus);

                if (res.extend) {
                    $('#extendInfoCard').removeClass('border-secondary').addClass('border-info');
                    $('#extendInfoHeader').removeClass('bg-secondary border-secondary').addClass('bg-info border-info');
                    $('#extendIpDisplay').html(`Extended Information <span class="badge bg-success ms-2">Existed !</span>`);
                    $('#extendForm').find('.form-control, .form-select').removeClass('text-light').addClass('text-bright-green');
                    // Except for warning
                    $('#extHostName.text-danger').removeClass('text-bright-green');

                    $('#pmSelect').val(res.extend.pm_id || "");
                    $('#osVer').val(res.extend.os_ver || "Others");
                    $('#extPurpose').val(res.extend.purpose || "");
                    $('#extComment').val(res.extend.comment || "");
                } else {
                    $('#extendInfoCard').removeClass('border-info').addClass('border-secondary');
                    $('#extendInfoHeader').removeClass('bg-info border-info').addClass('bg-secondary border-secondary');
                    $('#extendIpDisplay').html(`Extended Information`);
                    $('#extendForm').find('.form-control, .form-select').removeClass('text-bright-green').addClass('text-light');

                    // Reset form
                    $('#pmSelect').val("");
                    $('#osVer').val("Others");
                    $('#extPurpose').val("");
                    $('#extComment').val("");
                }
            }).fail(function () {
                alert("Error fetching IP details.");
            });
        });

        // 3. Save feature
        $('#saveBtn').click(function () {
            const payload = { ip: currentIP };

            // Grab basic logic
            payload.save_history = false;

            // Grab extend fields
            payload.device_type = $('#extDeviceType').val();
            payload.hostname = $('#extHostName').val();
            payload.status = $('#extStatus').val();
            payload.pm_id = $('#pmSelect').val();
            payload.os_ver = $('#osVer').val();
            payload.purpose = $('#extPurpose').val();
            payload.comment = $('#extComment').val();

            // Lock UI button
            const rawHtml = $(this).html();
            $(this).html('<i class="fa-solid fa-spinner fa-spin"></i> Saving...').prop('disabled', true);

            $.ajax({
                url: '/api/ip_detail/save',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(payload),
                success: function (res) {
                    if (res.status === 'success') {
                        const toast = new bootstrap.Toast(document.getElementById('saveToast'));
                        toast.show();
                        // Optional: re-trigger search to update state internally
                        setTimeout(() => $('#searchBtn').click(), 500);
                    } else {
                        alert('Error: ' + res.message);
                    }
                },
                error: function () {
                    alert('Save failed.');
                },
                complete: () => {
                    $(this).html(rawHtml).prop('disabled', false);
                }
            });
        });
    });
</script>
{% endblock %}
